<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentiment Analyzer</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: radial-gradient(circle at top, #1a1a1a, #000000);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .container {
        width: 420px;
        padding: 35px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        box-shadow:
          0 0 40px rgba(255, 255, 255, 0.05),
          0 10px 40px rgba(0, 0, 0, 0.8);
        text-align: center;
        transition: 0.3s;
      }

      .container:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 60px rgba(255, 255, 255, 0.08);
      }

      h2 {
        margin-bottom: 20px;
        font-weight: 500;
        letter-spacing: 1px;
      }

      textarea {
        width: 100%;
        height: 130px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 12px;
        font-size: 14px;
        outline: none;
        resize: none;
        margin-bottom: 15px;
        transition: 0.3s;
      }

      textarea:focus {
        border: 1px solid #888;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }

      textarea::placeholder {
        color: #aaa;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 30px;
        border: none;
        background: linear-gradient(135deg, #ffffff, #aaaaaa);
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        letter-spacing: 0.5px;
      }

      button:hover {
        transform: scale(1.03);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
      }

      button:active {
        transform: scale(0.97);
      }

      .loading {
        margin-top: 12px;
        font-size: 13px;
        opacity: 0.7;
      }

      .result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: 500;
        transition: 0.3s;
      }

      .positive {
        color: #00ffae;
        text-shadow: 0 0 10px rgba(0, 255, 174, 0.5);
      }

      .negative {
        color: #ff4d4d;
        text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
      }

      .neutral {
        color: #cccccc;
      }

      .text-area {
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Sentiment Analyzer</h2>

      <textarea id="text" placeholder="Type something..."></textarea>

      <button onclick="analyze()" class="text-area">Analyze Sentiment</button>

      <div class="loading" id="loading"></div>
      <div class="result" id="result"></div>
    </div>

    <script>
      async function analyze() {
        const text = document.getElementById("text").value;
        const resultEl = document.getElementById("result");
        const loadingEl = document.getElementById("loading");

        if (!text.trim()) {
          resultEl.innerText = "⚠️ Please enter some text!";
          resultEl.className = "result";
          return;
        }

        loadingEl.innerText = "Analyzing...";
        resultEl.innerText = "";

        try {
          const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ text }),
          });

          const data = await response.json();

          loadingEl.innerText = "";

          let sentimentClass = "neutral";

          if (data.sentiment.includes("Positive")) {
            sentimentClass = "positive";
          } else if (data.sentiment.includes("Negative")) {
            sentimentClass = "negative";
          }

          resultEl.className = "result " + sentimentClass;
          resultEl.innerText = data.sentiment;
        } catch (error) {
          loadingEl.innerText = "";
          resultEl.innerText = "❌ Server error";
        }
      }
    </script>
  </body>
</html>
